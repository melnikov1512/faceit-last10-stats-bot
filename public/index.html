<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Активные матчи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1a1a2e);
            --bg-secondary: var(--tg-theme-secondary-bg-color, #16213e);
            --text: var(--tg-theme-text-color, #eaeaea);
            --hint: var(--tg-theme-hint-color, #8a8a9a);
            --link: var(--tg-theme-link-color, #e8b10d);
            --button: var(--tg-theme-button-color, #e8b10d);
            --button-text: var(--tg-theme-button-text-color, #1a1a2e);
            --accent-blue: #5b8af0;
            --accent-red: #f05b5b;
            --elo-color: #e8b10d;
            --tracked: #4cde8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 12px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* ── Loading / Error / Empty states ── */
        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 12px;
            color: var(--hint);
            font-size: 15px;
            text-align: center;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--button);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Match card ── */
        .match-card {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .match-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 8px;
        }

        .match-meta {
            flex: 1;
            min-width: 0;
        }

        .match-competition {
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .match-details {
            font-size: 12px;
            color: var(--hint);
            margin-top: 2px;
        }

        .match-status {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-ONGOING  { background: #2d5a2d; color: #6fe06f; }
        .status-READY    { background: #2a4080; color: #8ab4f8; }
        .status-VOTING   { background: #4a3a00; color: #e8b10d; }
        .status-CONFIGURING { background: #3a3a3a; color: #aaa; }

        /* ── Score ── */
        .score-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 12px;
        }

        .score-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .score-name {
            font-size: 12px;
            color: var(--hint);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .score-val {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
        }

        .score-val.blue { color: var(--accent-blue); }
        .score-val.red  { color: var(--accent-red); }

        .score-sep {
            font-size: 20px;
            font-weight: 700;
            color: var(--hint);
        }

        /* ── Teams ── */
        .teams {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .team-col {
            min-width: 0;
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .team-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .team-dot.blue { background: var(--accent-blue); }
        .team-dot.red  { background: var(--accent-red); }

        .team-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team-elo-avg {
            font-size: 11px;
            color: var(--elo-color);
            white-space: nowrap;
        }

        /* ── Player row ── */
        .player-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .player-row:last-child { border-bottom: none; }

        .player-avatar {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
            object-fit: cover;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-nick {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .player-nick.tracked {
            color: var(--tracked);
        }

        .player-elo {
            font-size: 11px;
            color: var(--elo-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .skill-badge {
            display: inline-block;
            width: 16px; height: 16px;
            line-height: 16px;
            text-align: center;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* FACEIT skill level colours */
        .sl-1,.sl-2,.sl-3  { background:#f05b5b; color:#fff; }
        .sl-4,.sl-5,.sl-6  { background:#f5a623; color:#fff; }
        .sl-7,.sl-8        { background:#f5d623; color:#1a1a2e; }
        .sl-9,.sl-10       { background:#4cde8a; color:#1a1a2e; }

        /* ── Footer link ── */
        .match-footer {
            margin-top: 12px;
            text-align: center;
        }

        .watch-btn {
            display: inline-block;
            background: var(--button);
            color: var(--button-text);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
        }

        /* ── Refresh bar ── */
        .refresh-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .refresh-icon-btn {
            background: transparent;
            border: none;
            color: var(--hint);
            cursor: pointer;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            padding: 0;
            transition: color 0.2s;
        }

        .refresh-icon-btn:active { color: var(--button); }

        .refresh-icon-btn svg {
            transition: transform 0.3s;
        }

        .refresh-icon-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }

        .countdown {
            font-size: 12px;
            color: var(--hint);
            min-width: 28px;
            text-align: left;
        }

        /* ── Content overlay on refresh ── */
        .content-area {
            position: relative;
        }

        .content-area.refreshing::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            pointer-events: none;
            animation: fadeInOverlay 0.25s ease forwards;
            z-index: 10;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .tracked-label {
            font-size: 11px;
            color: var(--tracked);
            margin-bottom: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>🎮 Активные матчи</h1>
    <div id="refresh-bar" class="refresh-bar" style="display:none">
        <button id="refresh-btn" class="refresh-icon-btn" onclick="manualRefresh()" title="Обновить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/>
                <path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
                <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
            </svg>
        </button>
        <span id="countdown" class="countdown">60с</span>
    </div>
    <div id="app"></div>

    <script>
        // Read chatId from URL or Telegram initData (priority order):
        // 1. URL param ?chatId=... (private chat per-user button or inline button)
        // 2. start_param (direct link with startapp=chatId)
        // 3. initDataUnsafe.chat.id (group/supergroup menu button)
        // 4. initDataUnsafe.user.id (private chat global menu button fallback)
        const params = new URLSearchParams(window.location.search);
        const tgData = window.Telegram?.WebApp?.initDataUnsafe;
        let chatId = params.get('chatId')
            || tgData?.start_param
            || tgData?.chat?.id
            || tgData?.user?.id
            || null;
        if (chatId) chatId = String(chatId);

        const app       = document.getElementById('app');
        const refreshBar = document.getElementById('refresh-bar');
        const refreshBtn = document.getElementById('refresh-btn');
        const countdownEl = document.getElementById('countdown');

        const AUTO_REFRESH_SEC = 60;
        let countdownVal  = AUTO_REFRESH_SEC;
        let countdownTimer = null;
        let autoRefreshTimer = null;
        let hasContent = false; // true after first successful or empty load

        // ── Timer ────────────────────────────────────────────────
        function startAutoRefresh() {
            clearInterval(countdownTimer);
            clearTimeout(autoRefreshTimer);
            countdownVal = AUTO_REFRESH_SEC;
            countdownEl.textContent = `${countdownVal}с`;

            countdownTimer = setInterval(() => {
                countdownVal--;
                countdownEl.textContent = `${countdownVal}с`;
                if (countdownVal <= 0) clearInterval(countdownTimer);
            }, 1000);

            autoRefreshTimer = setTimeout(() => loadMatches(true), AUTO_REFRESH_SEC * 1000);
        }

        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            loadMatches(hasContent); // overlay only if content already showing
        }

        // ── Helpers ──────────────────────────────────────────────
        function showState(html) {
            app.innerHTML = `<div class="state">${html}</div>`;
        }

        function skillClass(level) {
            const l = parseInt(level);
            return l ? `sl-${l}` : '';
        }

        function statusLabel(status) {
            return { ONGOING: 'ИДЁТ', READY: 'СТАРТ', VOTING: 'ГОЛОСОВАНИЕ', CONFIGURING: 'НАСТРОЙКА' }[status] || status;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderAvatar(player) {
            if (player.avatar) {
                return `<img class="player-avatar" src="${player.avatar}" alt="" onerror="this.style.display='none'">`;
            }
            return `<div class="player-avatar"></div>`;
        }

        function renderPlayerRow(player) {
            const nick = player.nickname || player.game_player_name || '?';
            const nickClass = player.isTracked ? 'player-nick tracked' : 'player-nick';
            const elo = player.faceit_elo ? `${player.faceit_elo} ELO` : '— ELO';
            const sl = player.skill_level;
            const badge = sl ? `<span class="skill-badge ${skillClass(sl)}">${sl}</span>` : '';
            return `
                <div class="player-row">
                    ${renderAvatar(player)}
                    <div class="player-info">
                        <div class="${nickClass}">${escHtml(nick)}</div>
                        <div class="player-elo">${badge} ${elo}</div>
                    </div>
                </div>`;
        }

        function renderScore(results, team1Name, team2Name) {
            const score = results?.score;
            if (!score) return '';
            const s1 = score.faction1 ?? '–';
            const s2 = score.faction2 ?? '–';
            return `
                <div class="score-bar">
                    <div class="score-team">
                        <span class="score-name">${escHtml(team1Name)}</span>
                        <span class="score-val blue">${s1}</span>
                    </div>
                    <span class="score-sep">:</span>
                    <div class="score-team">
                        <span class="score-val red">${s2}</span>
                        <span class="score-name">${escHtml(team2Name)}</span>
                    </div>
                </div>`;
        }

        function renderTeamColumn(team, colorClass) {
            const avgElo  = team.stats?.rating ? `${team.stats.rating} avg ELO` : '';
            const winProb = team.stats?.winProbability != null
                ? ` · ${Math.round(team.stats.winProbability * 100)}% win` : '';
            const roster  = (team.roster || []).map(renderPlayerRow).join('');
            return `
                <div class="team-col">
                    <div class="team-header">
                        <div class="team-dot ${colorClass}"></div>
                        <div class="team-name">${escHtml(team.name || '—')}</div>
                    </div>
                    ${avgElo ? `<div class="team-elo-avg">${avgElo}${winProb}</div>` : ''}
                    <div style="margin-top:6px">${roster}</div>
                </div>`;
        }

        function renderMatch(match) {
            const metaParts   = [match.region, match.best_of ? `BO${match.best_of}` : null].filter(Boolean);
            const trackedLabel = match.trackedPlayers?.length ? `👀 ${match.trackedPlayers.join(', ')}` : '';
            const score = match.status === 'ONGOING'
                ? renderScore(match.results, match.teams.faction1.name, match.teams.faction2.name)
                : '';
            return `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-meta">
                            <div class="match-competition">${escHtml(match.competition_name || 'CS2 Match')}</div>
                            ${metaParts.length ? `<div class="match-details">${metaParts.join(' · ')}</div>` : ''}
                        </div>
                        <span class="match-status status-${match.status}">${statusLabel(match.status)}</span>
                    </div>
                    ${trackedLabel ? `<div class="tracked-label">${escHtml(trackedLabel)}</div>` : ''}
                    ${score}
                    <div class="teams">
                        ${renderTeamColumn(match.teams.faction1, 'blue')}
                        ${renderTeamColumn(match.teams.faction2, 'red')}
                    </div>
                    <div class="match-footer">
                        <a class="watch-btn" href="${match.matchUrl}" target="_blank">Смотреть матч →</a>
                    </div>
                </div>`;
        }

        // ── Load ─────────────────────────────────────────────────
        async function loadMatches(overlay = false) {
            if (!chatId) { showState('<span>❌ chatId не передан</span>'); return; }

            setRefreshing(true);
            if (!overlay) {
                showState('<div class="spinner"></div><span>Загрузка матчей…</span>');
            }

            try {
                const res = await fetch(`/api/active-matches?chatId=${encodeURIComponent(chatId)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                hasContent = true;
                refreshBar.style.display = 'flex';

                if (!data.matches?.length) {
                    app.innerHTML = `<div class="state">
                        <span>😴 Нет активных матчей</span>
                        <span style="font-size:13px">Ни один из подписанных игроков сейчас не играет</span>
                    </div>`;
                } else {
                    app.innerHTML = data.matches.map(renderMatch).join('');
                }
            } catch (err) {
                if (!overlay) {
                    showState(`<span>⚠️ Ошибка загрузки</span><span style="font-size:13px">${escHtml(err.message)}</span>`);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Init ─────────────────────────────────────────────────
        if (window.Telegram?.WebApp) Telegram.WebApp.ready();
        loadMatches(false);
    </script>
</body>
</html>
