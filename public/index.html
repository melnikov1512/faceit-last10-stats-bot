<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Активные матчи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg:        #121212;
            --card:      #1E1E1E;
            --card2:     #2A2A2A;
            --divider:   rgba(255,255,255,0.07);
            --text:      #FFFFFF;
            --text-sub:  #9E9E9E;
            --orange:    #FF5500;
            --orange-dim:#FF5500;
            --blue:      #409CFF;
            --red:       #FF5757;
            --tracked:   #FF5500;
            --green:     #52BC6A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 10px;
        }

        .top-bar-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-icon-btn {
            background: var(--card2);
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            flex-shrink: 0;
            padding: 0;
            transition: color 0.15s, background 0.15s;
        }
        .refresh-icon-btn:active { background: var(--orange); color: #fff; }
        .refresh-icon-btn.spinning svg { animation: spin 0.8s linear infinite; }

        .countdown {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sub);
            min-width: 28px;
        }

        /* ── Loading / Error / Empty states ── */
        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 10px;
            color: var(--text-sub);
            font-size: 14px;
            text-align: center;
            padding: 24px;
        }
        .state-icon { font-size: 40px; margin-bottom: 4px; }
        .state-title { font-size: 16px; font-weight: 600; color: var(--text); }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Match cards ── */
        #app { padding: 0 12px 24px; }

        .match-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        /* ── Match header ── */
        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid var(--divider);
            gap: 8px;
        }

        .match-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .match-game-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .match-meta { min-width: 0; }

        .match-competition {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-details {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 1px;
        }

        .match-status {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .status-ONGOING     { background: rgba(82,188,106,0.15); color: var(--green); }
        .status-READY       { background: rgba(255,85,0,0.15);   color: var(--orange); }
        .status-VOTING      { background: rgba(255,85,0,0.1);    color: #FF8C00; }
        .status-CONFIGURING { background: rgba(255,255,255,0.07); color: var(--text-sub); }

        /* ── VS / Score section ── */
        .vs-section {
            display: flex;
            align-items: center;
            padding: 14px 14px 0;
            gap: 8px;
        }

        .vs-team {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .vs-team.right { align-items: flex-end; text-align: right; }

        .vs-team-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vs-team-elo {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 1px;
        }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            gap: 2px;
        }

        .vs-score {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vs-score-num {
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            min-width: 24px;
            text-align: center;
        }

        .vs-score-sep {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-sub);
        }

        .vs-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── Divider between vs-section and players ── */
        .section-divider {
            height: 1px;
            background: var(--divider);
            margin: 12px 0 0;
        }

        /* ── Teams ── */
        .teams {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .team-col { min-width: 0; }

        .team-col:first-child {
            border-right: 1px solid var(--divider);
        }

        .team-col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px 6px;
        }

        .team-col-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        .team-col-avg {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-sub);
        }

        /* ── Player row ── */
        .player-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-top: 1px solid var(--divider);
            position: relative;
        }

        .player-row.tracked {
            background: rgba(255, 85, 0, 0.06);
        }

        .player-row.tracked::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: var(--orange);
            border-radius: 0 2px 2px 0;
        }

        .player-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            object-fit: cover;
        }

        .player-avatar-placeholder {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            color: var(--text-sub);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-nick {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            line-height: 1.3;
        }

        .player-nick.tracked { color: var(--orange); }

        .player-elo-line {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }

        .player-elo-val {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* ── Skill level badge ── */
        .skill-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px; height: 18px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            flex-shrink: 0;
            line-height: 1;
        }

        .sl-1,.sl-2,.sl-3   { background: #3D3D3D; color: #AAAAAA; }
        .sl-4,.sl-5,.sl-6   { background: rgba(95,186,83,0.2);  color: #5FBA53; }
        .sl-7,.sl-8         { background: rgba(255,196,0,0.2);  color: #FFC400; }
        .sl-9               { background: rgba(255,85,0,0.25);  color: #FF8500; }
        .sl-10              { background: rgba(255,85,0,0.3);   color: #FF5500; }

        /* ── Tracked badge ── */
        .tracked-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--orange);
            flex-shrink: 0;
        }

        /* ── Footer ── */
        .match-footer {
            padding: 12px 14px;
            border-top: 1px solid var(--divider);
        }

        .watch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--orange);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            letter-spacing: 0.1px;
            transition: opacity 0.15s;
        }
        .watch-btn:active { opacity: 0.85; }

        /* ── Content overlay on refresh ── */
        .content-area { position: relative; }

        .content-area.refreshing::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            pointer-events: none;
            animation: fadeInOverlay 0.2s ease forwards;
            z-index: 10;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span id="page-title" class="top-bar-title">Активные матчи</span>
        <div class="top-bar-actions" id="refresh-bar" style="display:none">
            <span id="countdown" class="countdown">60с</span>
            <button id="refresh-btn" class="refresh-icon-btn" onclick="manualRefresh()" title="Обновить">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"/>
                    <path d="M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
                    <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="app"></div>

    <script>
        // Read chatId / matchId from URL or Telegram initData.
        // Priority for chatId:
        //   1. URL param ?chatId=...  (private chat web_app button)
        //   2. start_param — either "chatId" or "chatId_matchId" (group direct link)
        //   3. initDataUnsafe.chat.id  (group menu button)
        //   4. initDataUnsafe.user.id  (private menu button fallback)
        // matchId is set when opened from a notification button (single-match view).
        const params = new URLSearchParams(window.location.search);
        const tgData = window.Telegram?.WebApp?.initDataUnsafe;

        let chatId   = params.get('chatId') || null;
        let matchId  = params.get('matchId') || null;

        // Parse start_param: "chatId" or "chatId_matchId"
        const startParam = tgData?.start_param;
        if (startParam && !chatId) {
            const sep = startParam.indexOf('_');
            if (sep > -1) {
                chatId  = startParam.substring(0, sep);
                matchId = matchId || startParam.substring(sep + 1);
            } else {
                chatId = startParam;
            }
        }

        if (!chatId) chatId = String(tgData?.chat?.id || tgData?.user?.id || '');
        if (chatId) chatId = String(chatId);

        const app       = document.getElementById('app');
        const refreshBar = document.getElementById('refresh-bar');
        const refreshBtn = document.getElementById('refresh-btn');
        const countdownEl = document.getElementById('countdown');

        const AUTO_REFRESH_SEC = 60;
        let countdownVal  = AUTO_REFRESH_SEC;
        let countdownTimer = null;
        let autoRefreshTimer = null;
        let hasContent = false; // true after first successful or empty load

        // ── Timer ────────────────────────────────────────────────
        function startAutoRefresh() {
            clearInterval(countdownTimer);
            clearTimeout(autoRefreshTimer);
            countdownVal = AUTO_REFRESH_SEC;
            countdownEl.textContent = `${countdownVal}с`;

            countdownTimer = setInterval(() => {
                countdownVal--;
                countdownEl.textContent = `${countdownVal}с`;
                if (countdownVal <= 0) clearInterval(countdownTimer);
            }, 1000);

            autoRefreshTimer = setTimeout(() => loadMatches(true), AUTO_REFRESH_SEC * 1000);
        }

        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            loadMatches(hasContent); // overlay only if content already showing
        }

        // ── Helpers ──────────────────────────────────────────────
        function skillClass(level) {
            const l = parseInt(level);
            return l ? `sl-${l}` : '';
        }

        function statusLabel(status) {
            return { ONGOING: 'Live', READY: 'Ready', VOTING: 'Voting', CONFIGURING: 'Starting' }[status] || status;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function avatarInitial(nick) {
            return (nick || '?').charAt(0).toUpperCase();
        }

        function renderAvatar(player) {
            const nick = player.nickname || player.game_player_name || '?';
            if (player.avatar) {
                return `<img class="player-avatar" src="${player.avatar}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'player-avatar-placeholder',textContent:'${avatarInitial(nick)}'}))">`;
            }
            return `<div class="player-avatar-placeholder">${avatarInitial(nick)}</div>`;
        }

        function renderPlayerRow(player) {
            const nick = player.nickname || player.game_player_name || '?';
            const nickClass = player.isTracked ? 'player-nick tracked' : 'player-nick';
            const elo = player.faceit_elo || '—';
            const sl = player.skill_level;
            const badge = sl ? `<span class="skill-badge ${skillClass(sl)}">${sl}</span>` : '';
            const trackedDot = player.isTracked ? `<span class="tracked-dot"></span>` : '';
            return `
                <div class="player-row${player.isTracked ? ' tracked' : ''}">
                    ${renderAvatar(player)}
                    <div class="player-info">
                        <div class="${nickClass}">${escHtml(nick)}</div>
                        <div class="player-elo-line">
                            ${badge}
                            <span class="player-elo-val">${elo}</span>
                            ${trackedDot}
                        </div>
                    </div>
                </div>`;
        }

        function renderVsSection(match) {
            const f1 = match.teams.faction1;
            const f2 = match.teams.faction2;
            const avg1 = f1.stats?.rating ? `Avg. ${f1.stats.rating}` : '';
            const avg2 = f2.stats?.rating ? `Avg. ${f2.stats.rating}` : '';

            let centerContent;
            if (match.status === 'ONGOING' && match.results?.score) {
                const s = match.results.score;
                centerContent = `
                    <div class="vs-score">
                        <span class="vs-score-num">${s.faction1 ?? '–'}</span>
                        <span class="vs-score-sep">:</span>
                        <span class="vs-score-num">${s.faction2 ?? '–'}</span>
                    </div>`;
            } else {
                centerContent = `<span class="vs-label">VS</span>`;
            }

            return `
                <div class="vs-section">
                    <div class="vs-team">
                        <div class="vs-team-name">${escHtml(f1.name || 'Faction 1')}</div>
                        ${avg1 ? `<div class="vs-team-elo">${avg1}</div>` : ''}
                    </div>
                    <div class="vs-center">${centerContent}</div>
                    <div class="vs-team right">
                        <div class="vs-team-name">${escHtml(f2.name || 'Faction 2')}</div>
                        ${avg2 ? `<div class="vs-team-elo">${avg2}</div>` : ''}
                    </div>
                </div>
                <div class="section-divider"></div>`;
        }

        function renderTeamColumn(team) {
            const roster = (team.roster || []).map(renderPlayerRow).join('');
            return `
                <div class="team-col">
                    <div class="team-col-header">
                        <span class="team-col-label">${escHtml(team.name || '—')}</span>
                    </div>
                    ${roster}
                </div>`;
        }

        function renderMatch(match) {
            const metaParts = [match.region, match.best_of ? `BO${match.best_of}` : null].filter(Boolean);
            return `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-header-left">
                            <div class="match-game-icon">🎮</div>
                            <div class="match-meta">
                                <div class="match-competition">${escHtml(match.competition_name || 'CS2 Match')}</div>
                                ${metaParts.length ? `<div class="match-details">${metaParts.join(' · ')}</div>` : ''}
                            </div>
                        </div>
                        <span class="match-status status-${match.status}">${statusLabel(match.status)}</span>
                    </div>
                    ${renderVsSection(match)}
                    <div class="teams">
                        ${renderTeamColumn(match.teams.faction1)}
                        ${renderTeamColumn(match.teams.faction2)}
                    </div>
                    <div class="match-footer">
                        <a class="watch-btn" href="${match.matchUrl}" target="_blank">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            Открыть на FACEIT
                        </a>
                    </div>
                </div>`;
        }

        function showState(icon, title, sub) {
            app.innerHTML = `<div class="state">
                <div class="state-icon">${icon}</div>
                <div class="state-title">${title}</div>
                ${sub ? `<div>${escHtml(sub)}</div>` : ''}
            </div>`;
        }

        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            loadMatches(hasContent);
        }

        // ── Load ─────────────────────────────────────────────────
        async function loadMatches(overlay = false) {
            if (!chatId) { showState('❌', 'chatId не передан', ''); return; }

            setRefreshing(true);
            if (!overlay) {
                app.innerHTML = `<div class="state"><div class="spinner"></div><div style="margin-top:4px">Загрузка…</div></div>`;
            }

            try {
                const res = await fetch(`/api/active-matches?chatId=${encodeURIComponent(chatId)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                let matches = data.matches || [];

                if (matchId) {
                    matches = matches.filter(m => m.matchId === matchId);
                }

                hasContent = true;
                refreshBar.style.display = 'flex';

                if (!matches.length) {
                    if (matchId) {
                        showState('⏱', 'Матч завершён', 'Информация о матче уже недоступна');
                    } else {
                        showState('😴', 'Нет активных матчей', 'Ни один из подписанных игроков сейчас не играет');
                    }
                } else {
                    app.innerHTML = matches.map(renderMatch).join('');
                }
            } catch (err) {
                if (!overlay) {
                    showState('⚠️', 'Ошибка загрузки', err.message);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Init ─────────────────────────────────────────────────
        if (window.Telegram?.WebApp) Telegram.WebApp.ready();
        if (matchId) document.getElementById('page-title').textContent = 'Матч';
        loadMatches(false);
    </script>
</body>
</html>
