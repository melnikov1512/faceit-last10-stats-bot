<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Активные матчи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg:        #121212;
            --card:      #1E1E1E;
            --card2:     #2A2A2A;
            --divider:   rgba(255,255,255,0.07);
            --text:      #FFFFFF;
            --text-sub:  #9E9E9E;
            --orange:    #FF5500;
            --orange-dim:#FF5500;
            --blue:      #409CFF;
            --red:       #FF5757;
            --tracked:   #FF5500;
            --green:     #52BC6A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 17px 19px 12px;
        }

        .top-bar-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .refresh-icon-btn {
            background: var(--card2);
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
            padding: 0;
            transition: color 0.15s, background 0.15s;
        }
        .refresh-icon-btn:active { background: var(--orange); color: #fff; }
        .refresh-icon-btn.spinning svg { animation: spin 0.8s linear infinite; }

        .countdown {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            min-width: 32px;
        }

        /* ── Loading / Error / Empty states ── */
        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 12px;
            color: var(--text-sub);
            font-size: 17px;
            text-align: center;
            padding: 29px;
        }
        .state-icon { font-size: 48px; margin-bottom: 4px; }
        .state-title { font-size: 19px; font-weight: 600; color: var(--text); }

        .spinner {
            width: 38px; height: 38px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Match cards ── */
        #app { padding: 0 14px 29px; }

        .match-card {
            background: var(--card);
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        /* ── Match header ── */
        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 17px;
            border-bottom: 1px solid var(--divider);
            gap: 10px;
        }

        .match-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .match-game-icon {
            width: 34px; height: 34px;
            border-radius: 7px;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px;
        }

        .match-map-img {
            width: 34px; height: 34px;
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0;
            display: block;
            background: #2C2C2C;
        }

        .match-meta { min-width: 0; }

        .match-competition {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-details {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 1px;
        }

        .match-status {
            font-size: 13px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            cursor: pointer;
        }
        .match-status:active { opacity: 0.75; }

        .status-ONGOING     { background: rgba(82,188,106,0.15);  color: var(--green); }
        .status-READY       { background: rgba(255,85,0,0.15);    color: var(--orange); }
        .status-VOTING      { background: rgba(255,85,0,0.1);     color: #FF8C00; }
        .status-CONFIGURING { background: rgba(255,255,255,0.07); color: var(--text-sub); }
        .status-FINISHED,
        .status-CANCELLED,
        .status-ABORTED,
        .status-WALKOVER,
        .status-DROPPED     { background: rgba(255,255,255,0.06); color: var(--text-sub); }

        /* ── VS / Score section ── */
        .vs-section {
            display: flex;
            flex-direction: column;
            padding: 14px 17px 0;
            gap: 6px;
        }

        /* Row 1: team names, each gets full half */
        .vs-names {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .vs-team-name {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            min-width: 0;
            overflow: hidden;
        }

        .vs-team-name span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vs-team-name.right { flex-direction: row-reverse; }

        .team-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--card2);
            font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: var(--text-sub);
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Row 2: elo | score | elo */
        .vs-bottom {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            gap: 10px;
        }

        .vs-team-elo {
            font-size: 13px;
            color: var(--text-sub);
        }

        .vs-team-elo.right { text-align: right; }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            gap: 2px;
            min-width: 96px;
        }

        .vs-score {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vs-score-num {
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            min-width: 28px;
            text-align: center;
        }

        .vs-score-num.winner {
            color: rgb(50, 211, 90);
            font-size: 36px;
            text-shadow: 0 0 16px rgba(50, 211, 90, 0.35);
        }

        .vs-score-sep {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-sub);
        }

        .vs-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── Divider between vs-section and players ── */
        .section-divider {
            height: 1px;
            background: var(--divider);
            margin: 14px 0 0;
        }

        /* ── Teams ── */
        .teams {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .team-col { min-width: 0; }

        .team-col:first-child {
            border-right: 1px solid var(--divider);
        }

        .team-col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px 7px;
            gap: 6px;
        }

        .team-col-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .team-col-avg {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
        }

        /* ── Player row ── */
        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-top: 1px solid var(--divider);
            position: relative;
        }

        .player-row.tracked {
            background: rgba(255, 85, 0, 0.06);
        }

        .player-row.tracked::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: var(--orange);
            border-radius: 0 2px 2px 0;
        }

        .player-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            object-fit: cover;
        }

        .player-avatar-placeholder {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            color: var(--text-sub);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-nick {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            line-height: 1.3;
        }

        .player-nick.tracked { color: var(--orange); }

        .player-elo-line {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .player-elo-val {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* ── Skill level badge (circular arc, matches PNG image style) ── */
        .skill-badge { flex-shrink: 0; display: block; }

        /* ── Tracked badge ── */
        .tracked-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--orange);
            flex-shrink: 0;
        }

        /* ── Match stats table (finished matches) ── */
        .maps-breakdown {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px 17px 0;
        }

        .map-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-sub);
            gap: 8px;
        }

        .map-row-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .map-row-score {
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .map-row-score .w { color: var(--green); }
        .map-row-score .l { color: var(--text-sub); }

        .stats-section {
            padding: 0 14px 14px;
        }

        .stats-team-block {
            margin-top: 14px;
        }

        .stats-team-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--text-sub);
            padding: 0 3px;
            margin-bottom: 6px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table th {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
            text-align: right;
            padding: 0 3px 6px;
            border-bottom: 1px solid var(--divider);
            white-space: nowrap;
        }

        .stats-table th:first-child { text-align: left; padding-left: 0; }

        .stats-table td {
            padding: 7px 3px;
            text-align: right;
            border-bottom: 1px solid var(--divider);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
        }

        .stats-table td:first-child {
            text-align: left;
            padding-left: 0;
            font-weight: 600;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats-player-cell {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }

        .stats-avatar, .stats-avatar-ph {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stats-avatar { object-fit: cover; background: #2C2C2C; }

        .stats-avatar-ph {
            background: #2C2C2C;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-sub);
        }

        .stats-player-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .stats-table tr:last-child td { border-bottom: none; }

        .stats-table tr.tracked td:first-child { color: var(--orange); }

        .stats-kd-good { color: var(--green); }
        .stats-kd-bad  { color: var(--red); }

        .stats-rating-good { color: var(--green); }
        .stats-rating-avg  { color: var(--text);  }
        .stats-rating-bad  { color: var(--red);   }

        
        .content-area { position: relative; }

        .content-area.refreshing::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            pointer-events: none;
            animation: fadeInOverlay 0.2s ease forwards;
            z-index: 10;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ── Win Probability bar ── */
        .win-prob-bar {
            width: 100%; height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
            margin: 4px 0 2px;
        }
        .wpr-fill { height: 100%; background: var(--orange); border-radius: 2px; }
        .win-prob-labels {
            display: flex; justify-content: space-between;
            font-size: 12px; font-weight: 600;
            color: var(--text-sub); width: 100%;
        }

        /* ── Mobile compact (< 360px) ── */
        @media (max-width: 359px) {
            .player-avatar, .player-avatar-placeholder { width: 30px; height: 30px; }
            .player-row { gap: 7px; padding: 7px 10px; }
            .player-nick { font-size: 12px; }
            .player-elo-val { font-size: 11px; }
            .vs-score-num { font-size: 26px; }
            .vs-score-num.winner { font-size: 32px; text-shadow: none; }
            .vs-team-name span { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span id="page-title" class="top-bar-title">Активные матчи</span>
        <div class="top-bar-actions" id="refresh-bar" style="display:none">
            <span id="countdown" class="countdown">60с</span>
            <button id="refresh-btn" class="refresh-icon-btn" onclick="manualRefresh()" title="Обновить">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"/>
                    <path d="M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
                    <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="app"></div>

    <script>
        // Read chatId / matchId from URL or Telegram initData.
        // Priority for chatId:
        //   1. URL param ?chatId=...  (private chat web_app button)
        //   2. start_param — either "chatId" or "chatId_matchId" (group direct link)
        //   3. initDataUnsafe.chat.id  (group menu button)
        //   4. initDataUnsafe.user.id  (private menu button fallback)
        // matchId is set when opened from a notification button (single-match view).
        const params = new URLSearchParams(window.location.search);
        const tgData = window.Telegram?.WebApp?.initDataUnsafe;

        let chatId   = params.get('chatId') || null;
        let matchId  = params.get('matchId') || null;

        // Parse start_param: "chatId" or "chatId_matchId"
        const startParam = tgData?.start_param;
        if (startParam && !chatId) {
            const sep = startParam.indexOf('_');
            if (sep > -1) {
                chatId  = startParam.substring(0, sep);
                matchId = matchId || startParam.substring(sep + 1);
            } else {
                chatId = startParam;
            }
        }

        if (!chatId) chatId = String(tgData?.chat?.id || tgData?.user?.id || '');
        if (chatId) chatId = String(chatId);

        const app       = document.getElementById('app');
        const refreshBar = document.getElementById('refresh-bar');
        const refreshBtn = document.getElementById('refresh-btn');
        const countdownEl = document.getElementById('countdown');

        const AUTO_REFRESH_SEC = 60;
        let countdownVal  = AUTO_REFRESH_SEC;
        let countdownTimer = null;
        let autoRefreshTimer = null;
        let hasContent = false; // true after first successful or empty load

        // Replace broken avatar images with initials placeholder
        document.addEventListener('error', (e) => {
            const img = e.target;
            if (img.classList?.contains('player-avatar')) {
                const div = Object.assign(document.createElement('div'), {
                    className: 'player-avatar-placeholder',
                    textContent: img.dataset.initial || '?',
                });
                img.replaceWith(div);
            }
        }, true);

        // ── Timer ────────────────────────────────────────────────
        // currentMatchStatus is set after each load; finished matches skip auto-refresh.
        let currentMatchStatus = null;

        function startAutoRefresh() {
            clearInterval(countdownTimer);
            clearTimeout(autoRefreshTimer);

            // Don't auto-refresh a finished single match — data won't change.
            if (matchId && currentMatchStatus && FINISHED_STATUSES.has(currentMatchStatus)) {
                countdownEl.textContent = '—';
                return;
            }

            countdownVal = AUTO_REFRESH_SEC;
            countdownEl.textContent = `${countdownVal}с`;

            countdownTimer = setInterval(() => {
                countdownVal--;
                countdownEl.textContent = `${countdownVal}с`;
                if (countdownVal <= 0) clearInterval(countdownTimer);
            }, 1000);

            const loader = matchId
                ? () => loadSingleMatch(true)
                : () => loadMatches(true);
            autoRefreshTimer = setTimeout(loader, AUTO_REFRESH_SEC * 1000);
        }

        function humanizeMapName(name) {
            if (!name) return null;
            // Already human-readable (from stats API) if it doesn't contain underscore prefix pattern
            // Handles: de_dust2 → Dust2, de_inferno → Inferno, cs_office → Office, ar_baggage → Baggage
            const KNOWN = {
                de_dust2: 'Dust2', de_inferno: 'Inferno', de_mirage: 'Mirage',
                de_nuke: 'Nuke', de_overpass: 'Overpass', de_ancient: 'Ancient',
                de_anubis: 'Anubis', de_vertigo: 'Vertigo', de_cache: 'Cache',
                de_train: 'Train', de_tuscan: 'Tuscan', de_assembly: 'Assembly',
                de_cbble: 'Cobblestone', cs_office: 'Office', ar_baggage: 'Baggage',
            };
            if (KNOWN[name]) return KNOWN[name];
            // Generic: strip prefix (de_, cs_, ar_) and capitalize
            const stripped = name.replace(/^[a-z]+_/, '');
            return stripped.charAt(0).toUpperCase() + stripped.slice(1);
        }

        function calcAvgElo(team) {
            const elos = (team.roster || [])
                .map(p => parseInt(p.faceit_elo))
                .filter(e => !isNaN(e) && e > 0);
            return elos.length ? Math.round(elos.reduce((a, b) => a + b, 0) / elos.length) : null;
        }

        function calcWinProb(eloA, eloB) {
            if (!eloA || !eloB) return null;
            const p = Math.round(100 / (1 + Math.pow(10, (eloB - eloA) / 400)));
            return { p1: p, p2: 100 - p };
        }

        function teamInitials(name) {
            return (name || '?').split(/[\s_-]+/).slice(0, 2)
                .map(w => w[0]?.toUpperCase() || '').join('');
        }

        // Skill level colour map — matches SKILL_COLOR in imageService.js exactly
        const SKILL_COLORS = {
            1:'#888888', 2:'#888888', 3:'#888888',
            4:'#5FBA53', 5:'#5FBA53', 6:'#5FBA53',
            7:'#FFC400', 8:'#FFC400',
            9:'#FF8500', 10:'#FF5500',
        };

        /**
         * Renders a circular FACEIT-style skill badge as an inline SVG.
         * Mirrors drawSkillBadge() from imageService.js:
         *  – dark background circle (#161616)
         *  – 300° coloured arc (gap at bottom centre)
         *  – coloured level number in the centre
         */
        function renderSkillBadge(level) {
            const l = parseInt(level);
            if (!l || l < 1 || l > 10) return '';
            const color   = SKILL_COLORS[l] || '#9E9E9E';
            const r       = 15;                          // outer badge radius → 30×30 px
            const size    = r * 2;
            const cx = r, cy = r;
            const lineW   = +(Math.max(2.5, r * 0.17)).toFixed(2);   // ≈ 2.55
            const arcR    = +(r - lineW / 2).toFixed(2);             // ≈ 12.73
            const circ    = 2 * Math.PI * arcR;
            const arcLen  = +((300 / 360) * circ).toFixed(2);
            const gapLen  = +(circ - arcLen).toFixed(2);
            const fs      = Math.round(r * 0.82);                     // ≈ 12 px
            return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="skill-badge" aria-label="Skill level ${l} of 10">`
                + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#161616"/>`
                + `<circle cx="${cx}" cy="${cy}" r="${arcR}" fill="none"`
                +  ` stroke="${color}" stroke-width="${lineW}" stroke-linecap="round"`
                +  ` stroke-dasharray="${arcLen} ${gapLen}" transform="rotate(120,${cx},${cy})"/>`
                + `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"`
                +  ` fill="${color}" font-family="Inter,sans-serif" font-size="${fs}" font-weight="bold">${l}</text>`
                + `</svg>`;
        }

        function statusLabel(status) {
            return {
                ONGOING:     'Live',
                READY:       'Ready',
                VOTING:      'Voting',
                CONFIGURING: 'Starting',
                FINISHED:    'Завершён',
                CANCELLED:   'Отменён',
                ABORTED:     'Прерван',
                WALKOVER:    'Walkover',
                DROPPED:     'Dropped',
            }[status] || status;
        }

        const FINISHED_STATUSES = new Set(['FINISHED', 'CANCELLED', 'ABORTED', 'WALKOVER', 'DROPPED']);

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function avatarInitial(nick) {
            return (nick || '?').charAt(0).toUpperCase();
        }

        function renderAvatar(player) {
            const nick = player.nickname || player.game_player_name || '?';
            if (player.avatar) {
                return `<img class="player-avatar" src="${player.avatar}" alt="" data-initial="${avatarInitial(nick)}">`;
            }
            return `<div class="player-avatar-placeholder">${avatarInitial(nick)}</div>`;
        }

        function renderPlayerRow(player) {
            const nick = player.nickname || player.game_player_name || '?';
            const nickClass = player.isTracked ? 'player-nick tracked' : 'player-nick';
            const elo = player.faceit_elo || '—';
            const sl = player.skill_level;
            const badge = sl ? renderSkillBadge(sl) : '';
            const trackedDot = player.isTracked ? `<span class="tracked-dot"></span>` : '';
            return `
                <div class="player-row${player.isTracked ? ' tracked' : ''}">
                    ${renderAvatar(player)}
                    <div class="player-info">
                        <div class="${nickClass}">${escHtml(nick)}</div>
                        <div class="player-elo-line">
                            ${badge}
                            <span class="player-elo-val">${elo}</span>
                            ${trackedDot}
                        </div>
                    </div>
                </div>`;
        }

        function renderVsSection(match) {
            const f1 = match.teams.faction1;
            const f2 = match.teams.faction2;
            const a1 = f1.stats?.rating || calcAvgElo(f1);
            const a2 = f2.stats?.rating || calcAvgElo(f2);
            const avg1 = a1 ? `Avg. ${a1}` : '';
            const avg2 = a2 ? `Avg. ${a2}` : '';

            let centerContent;
            if (match.results?.score) {
                const s = match.results.score;
                const winner = match.results.winner;
                const c1 = winner === 'faction1' ? ' winner' : '';
                const c2 = winner === 'faction2' ? ' winner' : '';
                centerContent = `
                    <div class="vs-score">
                        <span class="vs-score-num${c1}">${s.faction1 ?? '–'}</span>
                        <span class="vs-score-sep">:</span>
                        <span class="vs-score-num${c2}">${s.faction2 ?? '–'}</span>
                    </div>`;
            } else {
                const wp = (a1 && a2) ? calcWinProb(a1, a2) : null;
                if (wp) {
                    centerContent = `
                        <div class="win-prob-bar">
                            <div class="wpr-fill" style="width:${wp.p1}%"></div>
                        </div>
                        <div class="win-prob-labels">
                            <span>${wp.p1}%</span>
                            <span class="vs-label">WIN PROB</span>
                            <span>${wp.p2}%</span>
                        </div>`;
                } else {
                    centerContent = `<span class="vs-label">VS</span>`;
                }
            }

            return `
                <div class="vs-section">
                    <div class="vs-names">
                        <div class="vs-team-name">
                            <div class="team-avatar" aria-hidden="true">${teamInitials(f1.name)}</div>
                            <span>${escHtml(f1.name || 'Faction 1')}</span>
                        </div>
                        <div class="vs-team-name right">
                            <div class="team-avatar" aria-hidden="true">${teamInitials(f2.name)}</div>
                            <span>${escHtml(f2.name || 'Faction 2')}</span>
                        </div>
                    </div>
                    <div class="vs-bottom">
                        <div class="vs-team-elo">${avg1}</div>
                        <div class="vs-center">${centerContent}</div>
                        <div class="vs-team-elo right">${avg2}</div>
                    </div>
                </div>
                <div class="section-divider"></div>`;
        }

        function renderTeamColumn(team) {
            const roster = (team.roster || []).map(renderPlayerRow).join('');
            return `
                <div class="team-col">
                    <div class="team-col-header">
                        <span class="team-col-label">${escHtml(team.name || '—')}</span>
                    </div>
                    ${roster}
                </div>`;
        }

        function renderMapsBreakdown(maps) {
            if (!maps?.length) return '';
            const rows = maps.map(m => {
                const f1 = m.f1_score ?? '?';
                const f2 = m.f2_score ?? '?';
                const w1 = m.winner === 'faction1';
                const w2 = m.winner === 'faction2';
                const c1 = w1 ? ' class="w"' : (w2 ? ' class="l"' : '');
                const c2 = w2 ? ' class="w"' : (w1 ? ' class="l"' : '');
                return `<div class="map-row">
                    <span class="map-row-name">🗺 ${escHtml(m.map)}</span>
                    <span class="map-row-score"><span${c1}>${f1}</span> – <span${c2}>${f2}</span></span>
                </div>`;
            });
            return `<div class="maps-breakdown">${rows.join('')}</div>`;
        }

        function renderStatsTable(factionKey, factionName, players) {
            const entries = Object.entries(players)
                .filter(([, p]) => p.faction === factionKey);

            if (!entries.length) return '';

            // Detect if FACEIT Rating is available for at least one player in this faction
            const hasFaceitRating = entries.some(([, p]) => p.faceitRating != null);

            // Sort: by faceitRating desc if available, else by kills desc
            const rows = entries.sort(([, a], [, b]) =>
                hasFaceitRating
                    ? (b.faceitRating ?? -Infinity) - (a.faceitRating ?? -Infinity)
                    : b.kills - a.kills
            );

            const kdClass     = (kd) => parseFloat(kd) >= 1.0 ? 'stats-kd-good' : 'stats-kd-bad';
            const ratingClass = (r)  => r >= 1.1 ? 'stats-rating-good' : r < 0.9 ? 'stats-rating-bad' : 'stats-rating-avg';

            const trs = rows.map(([, p]) => {
                const cls = p.isTracked ? ' class="tracked"' : '';
                const avatarHtml = p.avatar
                    ? `<img class="stats-avatar" src="${p.avatar}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                      + `<div class="stats-avatar-ph" style="display:none">${avatarInitial(p.nickname)}</div>`
                    : `<div class="stats-avatar-ph">${avatarInitial(p.nickname)}</div>`;

                const ratingCell = hasFaceitRating
                    ? (p.faceitRating != null
                        ? `<td><span class="${ratingClass(p.faceitRating)}">${p.faceitRating.toFixed(2)}</span></td>`
                        : `<td><span class="stats-rating-avg">—</span></td>`)
                    : '';

                return `<tr${cls}>
                    <td><div class="stats-player-cell">${avatarHtml}<span class="stats-player-name">${escHtml(p.nickname)}</span></div></td>
                    ${ratingCell}
                    <td>${p.kills}</td>
                    <td>${p.deaths}</td>
                    <td>${p.assists}</td>
                    <td>${p.adr}</td>
                    <td><span class="${kdClass(p.kd)}">${p.kd}</span></td>
                    <td>${p.hs_pct}%</td>
                </tr>`;
            }).join('');

            const ratingHeader = hasFaceitRating ? '<th>Rating</th>' : '';

            return `<div class="stats-team-block">
                <div class="stats-team-title">${escHtml(factionName)}</div>
                <table class="stats-table">
                    <thead><tr>
                        <th>Игрок</th>${ratingHeader}<th>K</th><th>D</th><th>A</th><th>ADR</th><th>K/D</th><th>HS%</th>
                    </tr></thead>
                    <tbody>${trs}</tbody>
                </table>
            </div>`;
        }

        function renderStatsSection(match) {
            const ms = match.matchStats;
            if (!ms) return '';
            const f1 = match.teams.faction1;
            const f2 = match.teams.faction2;
            const tables = renderStatsTable('faction1', f1.name || 'Faction 1', ms.players)
                         + renderStatsTable('faction2', f2.name || 'Faction 2', ms.players);
            return `<div class="stats-section">${tables}</div>`;
        }

        function renderMatch(match) {
            // Resolve map name: prefer voting data, fall back to first map in stats
            const rawMapName = match.mapInfo?.name || match.matchStats?.maps?.[0]?.map || null;
            const mapName    = rawMapName ? humanizeMapName(rawMapName) : null;
            const mapImage   = match.mapInfo?.image || null;

            const metaParts = [
                mapName,
                '5v5',
                match.region,
                match.best_of ? `BO${match.best_of}` : null,
            ].filter(Boolean);

            const extIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF5500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;display:block"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
            const hasStats = !!match.matchStats;
            const multiMap = hasStats && match.matchStats.maps.length > 1;

            const iconHtml = mapImage
                ? `<img class="match-map-img" src="${mapImage}" alt="${escHtml(mapName || '')}" onerror="this.outerHTML='<div class=\\'match-game-icon\\'>🎮</div>'">`
                : `<div class="match-game-icon">🎮</div>`;
            return `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-header-left">
                            ${iconHtml}
                            <div class="match-meta">
                                <div class="match-competition">${escHtml(match.competition_name || 'CS2 Match')}</div>
                                ${metaParts.length ? `<div class="match-details">${metaParts.join(' · ')}</div>` : ''}
                            </div>
                        </div>
                        <a class="match-status status-${match.status}" href="${match.matchUrl}" target="_blank">${statusLabel(match.status)}${extIcon}</a>
                    </div>
                    ${renderVsSection(match)}
                    ${multiMap ? renderMapsBreakdown(match.matchStats.maps) : ''}
                    ${hasStats
                        ? renderStatsSection(match)
                        : `<div class="teams">
                            ${renderTeamColumn(match.teams.faction1)}
                            ${renderTeamColumn(match.teams.faction2)}
                           </div>`
                    }
                </div>`;
        }

        function showState(icon, title, sub) {
            app.innerHTML = `<div class="state">
                <div class="state-icon">${icon}</div>
                <div class="state-title">${title}</div>
                ${sub ? `<div>${escHtml(sub)}</div>` : ''}
            </div>`;
        }

        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            if (matchId) {
                loadSingleMatch(hasContent);
            } else {
                loadMatches(hasContent);
            }
        }

        // ── Single match loader (from notification button) ────────
        async function loadSingleMatch(overlay = false) {
            setRefreshing(true);
            if (!overlay) {
                app.innerHTML = `<div class="state"><div class="spinner"></div><div style="margin-top:4px">Загрузка…</div></div>`;
            }

            try {
                const params = new URLSearchParams({ matchId });
                if (chatId) params.set('chatId', chatId);
                const res = await fetch(`/api/match?${params}`);
                if (!res.ok) {
                    if (!overlay) showState('⚠️', 'Ошибка загрузки', `HTTP ${res.status}`);
                } else {
                    const data = await res.json();
                    hasContent = true;
                    currentMatchStatus = data.match?.status || null;
                    refreshBar.style.display = 'flex';
                    app.innerHTML = renderMatch(data.match);
                }
            } catch (err) {
                if (!overlay) {
                    showState('⚠️', 'Ошибка загрузки', err.message);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Active matches loader (from /live) ────────────────────
        async function loadMatches(overlay = false) {
            if (!chatId) { showState('❌', 'chatId не передан', ''); return; }

            setRefreshing(true);
            if (!overlay) {
                app.innerHTML = `<div class="state"><div class="spinner"></div><div style="margin-top:4px">Загрузка…</div></div>`;
            }

            try {
                const res = await fetch(`/api/active-matches?chatId=${encodeURIComponent(chatId)}`);
                if (!res.ok) {
                    if (!overlay) showState('⚠️', 'Ошибка загрузки', `HTTP ${res.status}`);
                } else {
                    const data = await res.json();
                    const matches = data.matches || [];
                    hasContent = true;
                    refreshBar.style.display = 'flex';
                    if (!matches.length) {
                        showState('😴', 'Нет активных матчей', 'Ни один из подписанных игроков сейчас не играет');
                    } else {
                        app.innerHTML = matches.map(renderMatch).join('');
                    }
                }
            } catch (err) {
                if (!overlay) {
                    showState('⚠️', 'Ошибка загрузки', err.message);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Init ─────────────────────────────────────────────────
        if (window.Telegram?.WebApp) Telegram.WebApp.ready();
        if (matchId) {
            document.getElementById('page-title').textContent = 'Матч';
            loadSingleMatch(false);
        } else {
            loadMatches(false);
        }
    </script>
</body>
</html>
