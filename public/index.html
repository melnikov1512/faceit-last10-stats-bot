<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Активные матчи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg:        #121212;
            --card:      #1E1E1E;
            --card2:     #2A2A2A;
            --divider:   rgba(255,255,255,0.07);
            --text:      #FFFFFF;
            --text-sub:  #9E9E9E;
            --orange:    #FF5500;
            --orange-dim:#FF5500;
            --blue:      #409CFF;
            --red:       #FF5757;
            --tracked:   #FF5500;
            --green:     #52BC6A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 17px 19px 12px;
        }

        .top-bar-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .refresh-icon-btn {
            background: var(--card2);
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
            padding: 0;
            transition: color 0.15s, background 0.15s;
        }
        .refresh-icon-btn:active { background: var(--orange); color: #fff; }
        .refresh-icon-btn.spinning svg { animation: spin 0.8s linear infinite; }

        .countdown {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            min-width: 32px;
        }

        /* ── Loading / Error / Empty states ── */
        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 12px;
            color: var(--text-sub);
            font-size: 17px;
            text-align: center;
            padding: 29px;
        }
        .state-icon { font-size: 48px; margin-bottom: 4px; }
        .state-title { font-size: 19px; font-weight: 600; color: var(--text); }

        .spinner {
            width: 38px; height: 38px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Match cards ── */
        #app { padding: 0 14px 29px; }

        .match-card {
            background: var(--card);
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        /* ── Match header ── */
        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 17px;
            border-bottom: 1px solid var(--divider);
            gap: 10px;
        }

        .match-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .match-game-icon {
            width: 34px; height: 34px;
            border-radius: 7px;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px;
        }

        .match-meta { min-width: 0; }

        .match-competition {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-details {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 1px;
        }

        .match-status {
            font-size: 13px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            cursor: pointer;
        }
        .match-status:active { opacity: 0.75; }

        .status-ONGOING     { background: rgba(82,188,106,0.15);  color: var(--green); }
        .status-READY       { background: rgba(255,85,0,0.15);    color: var(--orange); }
        .status-VOTING      { background: rgba(255,85,0,0.1);     color: #FF8C00; }
        .status-CONFIGURING { background: rgba(255,255,255,0.07); color: var(--text-sub); }
        .status-FINISHED,
        .status-CANCELLED,
        .status-ABORTED,
        .status-WALKOVER,
        .status-DROPPED     { background: rgba(255,255,255,0.06); color: var(--text-sub); }

        /* ── VS / Score section ── */
        .vs-section {
            display: flex;
            flex-direction: column;
            padding: 14px 17px 0;
            gap: 6px;
        }

        /* Row 1: team names, each gets full half */
        .vs-names {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .vs-team-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vs-team-name.right { text-align: right; }

        /* Row 2: elo | score | elo */
        .vs-bottom {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            gap: 10px;
        }

        .vs-team-elo {
            font-size: 13px;
            color: var(--text-sub);
        }

        .vs-team-elo.right { text-align: right; }

        .vs-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            gap: 2px;
            min-width: 96px;
        }

        .vs-score {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .vs-score-num {
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            min-width: 28px;
            text-align: center;
        }

        .vs-score-num.winner { color: rgb(50, 211, 90); }

        .vs-score-sep {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-sub);
        }

        .vs-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ── Divider between vs-section and players ── */
        .section-divider {
            height: 1px;
            background: var(--divider);
            margin: 14px 0 0;
        }

        /* ── Teams ── */
        .teams {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .team-col { min-width: 0; }

        .team-col:first-child {
            border-right: 1px solid var(--divider);
        }

        .team-col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px 7px;
            gap: 6px;
        }

        .team-col-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .team-col-avg {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
        }

        /* ── Player row ── */
        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-top: 1px solid var(--divider);
            position: relative;
        }

        .player-row.tracked {
            background: rgba(255, 85, 0, 0.06);
        }

        .player-row.tracked::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 2px;
            background: var(--orange);
            border-radius: 0 2px 2px 0;
        }

        .player-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            object-fit: cover;
        }

        .player-avatar-placeholder {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #2C2C2C;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            color: var(--text-sub);
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-nick {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            line-height: 1.3;
        }

        .player-nick.tracked { color: var(--orange); }

        .player-elo-line {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .player-elo-val {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
        }

        /* ── Skill level badge ── */
        .skill-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px; height: 22px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 800;
            flex-shrink: 0;
            line-height: 1;
        }

        .sl-1,.sl-2,.sl-3   { background: #3D3D3D; color: #AAAAAA; }
        .sl-4,.sl-5,.sl-6   { background: rgba(95,186,83,0.2);  color: #5FBA53; }
        .sl-7,.sl-8         { background: rgba(255,196,0,0.2);  color: #FFC400; }
        .sl-9               { background: rgba(255,85,0,0.25);  color: #FF8500; }
        .sl-10              { background: rgba(255,85,0,0.3);   color: #FF5500; }

        /* ── Tracked badge ── */
        .tracked-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--orange);
            flex-shrink: 0;
        }

        /* ── Content overlay on refresh ── */
        .content-area { position: relative; }

        .content-area.refreshing::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            pointer-events: none;
            animation: fadeInOverlay 0.2s ease forwards;
            z-index: 10;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span id="page-title" class="top-bar-title">Активные матчи</span>
        <div class="top-bar-actions" id="refresh-bar" style="display:none">
            <span id="countdown" class="countdown">60с</span>
            <button id="refresh-btn" class="refresh-icon-btn" onclick="manualRefresh()" title="Обновить">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"/>
                    <path d="M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
                    <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="app"></div>

    <script>
        // Read chatId / matchId from URL or Telegram initData.
        // Priority for chatId:
        //   1. URL param ?chatId=...  (private chat web_app button)
        //   2. start_param — either "chatId" or "chatId_matchId" (group direct link)
        //   3. initDataUnsafe.chat.id  (group menu button)
        //   4. initDataUnsafe.user.id  (private menu button fallback)
        // matchId is set when opened from a notification button (single-match view).
        const params = new URLSearchParams(window.location.search);
        const tgData = window.Telegram?.WebApp?.initDataUnsafe;

        let chatId   = params.get('chatId') || null;
        let matchId  = params.get('matchId') || null;

        // Parse start_param: "chatId" or "chatId_matchId"
        const startParam = tgData?.start_param;
        if (startParam && !chatId) {
            const sep = startParam.indexOf('_');
            if (sep > -1) {
                chatId  = startParam.substring(0, sep);
                matchId = matchId || startParam.substring(sep + 1);
            } else {
                chatId = startParam;
            }
        }

        if (!chatId) chatId = String(tgData?.chat?.id || tgData?.user?.id || '');
        if (chatId) chatId = String(chatId);

        const app       = document.getElementById('app');
        const refreshBar = document.getElementById('refresh-bar');
        const refreshBtn = document.getElementById('refresh-btn');
        const countdownEl = document.getElementById('countdown');

        const AUTO_REFRESH_SEC = 60;
        let countdownVal  = AUTO_REFRESH_SEC;
        let countdownTimer = null;
        let autoRefreshTimer = null;
        let hasContent = false; // true after first successful or empty load

        // ── Timer ────────────────────────────────────────────────
        // currentMatchStatus is set after each load; finished matches skip auto-refresh.
        let currentMatchStatus = null;

        function startAutoRefresh() {
            clearInterval(countdownTimer);
            clearTimeout(autoRefreshTimer);

            // Don't auto-refresh a finished single match — data won't change.
            if (matchId && currentMatchStatus && FINISHED_STATUSES.has(currentMatchStatus)) {
                countdownEl.textContent = '—';
                return;
            }

            countdownVal = AUTO_REFRESH_SEC;
            countdownEl.textContent = `${countdownVal}с`;

            countdownTimer = setInterval(() => {
                countdownVal--;
                countdownEl.textContent = `${countdownVal}с`;
                if (countdownVal <= 0) clearInterval(countdownTimer);
            }, 1000);

            const loader = matchId
                ? () => loadSingleMatch(true)
                : () => loadMatches(true);
            autoRefreshTimer = setTimeout(loader, AUTO_REFRESH_SEC * 1000);
        }

        // ── Helpers ──────────────────────────────────────────────
        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            if (matchId) {
                loadSingleMatch(hasContent);
            } else {
                loadMatches(hasContent);
            }
        }

        function skillClass(level) {
            const l = parseInt(level);
            return l ? `sl-${l}` : '';
        }

        function statusLabel(status) {
            return {
                ONGOING:     'Live',
                READY:       'Ready',
                VOTING:      'Voting',
                CONFIGURING: 'Starting',
                FINISHED:    'Завершён',
                CANCELLED:   'Отменён',
                ABORTED:     'Прерван',
                WALKOVER:    'Walkover',
                DROPPED:     'Dropped',
            }[status] || status;
        }

        const FINISHED_STATUSES = new Set(['FINISHED', 'CANCELLED', 'ABORTED', 'WALKOVER', 'DROPPED']);

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function avatarInitial(nick) {
            return (nick || '?').charAt(0).toUpperCase();
        }

        function renderAvatar(player) {
            const nick = player.nickname || player.game_player_name || '?';
            if (player.avatar) {
                return `<img class="player-avatar" src="${player.avatar}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'player-avatar-placeholder',textContent:'${avatarInitial(nick)}'}))">`;
            }
            return `<div class="player-avatar-placeholder">${avatarInitial(nick)}</div>`;
        }

        function renderPlayerRow(player) {
            const nick = player.nickname || player.game_player_name || '?';
            const nickClass = player.isTracked ? 'player-nick tracked' : 'player-nick';
            const elo = player.faceit_elo || '—';
            const sl = player.skill_level;
            const badge = sl ? `<span class="skill-badge ${skillClass(sl)}">${sl}</span>` : '';
            const trackedDot = player.isTracked ? `<span class="tracked-dot"></span>` : '';
            return `
                <div class="player-row${player.isTracked ? ' tracked' : ''}">
                    ${renderAvatar(player)}
                    <div class="player-info">
                        <div class="${nickClass}">${escHtml(nick)}</div>
                        <div class="player-elo-line">
                            ${badge}
                            <span class="player-elo-val">${elo}</span>
                            ${trackedDot}
                        </div>
                    </div>
                </div>`;
        }

        function renderVsSection(match) {
            const f1 = match.teams.faction1;
            const f2 = match.teams.faction2;
            const avg1 = f1.stats?.rating ? `Avg. ${f1.stats.rating}` : '';
            const avg2 = f2.stats?.rating ? `Avg. ${f2.stats.rating}` : '';

            let centerContent;
            if (match.results?.score) {
                const s = match.results.score;
                const winner = match.results.winner;
                const c1 = winner === 'faction1' ? ' winner' : '';
                const c2 = winner === 'faction2' ? ' winner' : '';
                centerContent = `
                    <div class="vs-score">
                        <span class="vs-score-num${c1}">${s.faction1 ?? '–'}</span>
                        <span class="vs-score-sep">:</span>
                        <span class="vs-score-num${c2}">${s.faction2 ?? '–'}</span>
                    </div>`;
            } else {
                centerContent = `<span class="vs-label">VS</span>`;
            }

            return `
                <div class="vs-section">
                    <div class="vs-names">
                        <div class="vs-team-name">${escHtml(f1.name || 'Faction 1')}</div>
                        <div class="vs-team-name right">${escHtml(f2.name || 'Faction 2')}</div>
                    </div>
                    <div class="vs-bottom">
                        <div class="vs-team-elo">${avg1}</div>
                        <div class="vs-center">${centerContent}</div>
                        <div class="vs-team-elo right">${avg2}</div>
                    </div>
                </div>
                <div class="section-divider"></div>`;
        }

        function renderTeamColumn(team) {
            const roster = (team.roster || []).map(renderPlayerRow).join('');
            return `
                <div class="team-col">
                    <div class="team-col-header">
                        <span class="team-col-label">${escHtml(team.name || '—')}</span>
                    </div>
                    ${roster}
                </div>`;
        }

        function renderMatch(match) {
            const metaParts = [match.region, match.best_of ? `BO${match.best_of}` : null].filter(Boolean);
            const extIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF5500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
            return `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-header-left">
                            <div class="match-game-icon">🎮</div>
                            <div class="match-meta">
                                <div class="match-competition">${escHtml(match.competition_name || 'CS2 Match')}</div>
                                ${metaParts.length ? `<div class="match-details">${metaParts.join(' · ')}</div>` : ''}
                            </div>
                        </div>
                        <a class="match-status status-${match.status}" href="${match.matchUrl}" target="_blank">${statusLabel(match.status)}${extIcon}</a>
                    </div>
                    ${renderVsSection(match)}
                    <div class="teams">
                        ${renderTeamColumn(match.teams.faction1)}
                        ${renderTeamColumn(match.teams.faction2)}
                    </div>
                </div>`;
        }

        function showState(icon, title, sub) {
            app.innerHTML = `<div class="state">
                <div class="state-icon">${icon}</div>
                <div class="state-title">${title}</div>
                ${sub ? `<div>${escHtml(sub)}</div>` : ''}
            </div>`;
        }

        function setRefreshing(on) {
            refreshBtn.classList.toggle('spinning', on);
            app.classList.toggle('content-area', hasContent);
            app.classList.toggle('refreshing', on && hasContent);
        }

        function manualRefresh() {
            if (matchId) {
                loadSingleMatch(hasContent);
            } else {
                loadMatches(hasContent);
            }
        }

        // ── Single match loader (from notification button) ────────
        async function loadSingleMatch(overlay = false) {
            setRefreshing(true);
            if (!overlay) {
                app.innerHTML = `<div class="state"><div class="spinner"></div><div style="margin-top:4px">Загрузка…</div></div>`;
            }

            try {
                const params = new URLSearchParams({ matchId });
                if (chatId) params.set('chatId', chatId);
                const res = await fetch(`/api/match?${params}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                hasContent = true;
                currentMatchStatus = data.match?.status || null;
                refreshBar.style.display = 'flex';
                app.innerHTML = renderMatch(data.match);
            } catch (err) {
                if (!overlay) {
                    showState('⚠️', 'Ошибка загрузки', err.message);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Active matches loader (from /live) ────────────────────
        async function loadMatches(overlay = false) {
            if (!chatId) { showState('❌', 'chatId не передан', ''); return; }

            setRefreshing(true);
            if (!overlay) {
                app.innerHTML = `<div class="state"><div class="spinner"></div><div style="margin-top:4px">Загрузка…</div></div>`;
            }

            try {
                const res = await fetch(`/api/active-matches?chatId=${encodeURIComponent(chatId)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const matches = data.matches || [];

                hasContent = true;
                refreshBar.style.display = 'flex';

                if (!matches.length) {
                    showState('😴', 'Нет активных матчей', 'Ни один из подписанных игроков сейчас не играет');
                } else {
                    app.innerHTML = matches.map(renderMatch).join('');
                }
            } catch (err) {
                if (!overlay) {
                    showState('⚠️', 'Ошибка загрузки', err.message);
                }
            } finally {
                setRefreshing(false);
                startAutoRefresh();
            }
        }

        // ── Init ─────────────────────────────────────────────────
        if (window.Telegram?.WebApp) Telegram.WebApp.ready();
        if (matchId) {
            document.getElementById('page-title').textContent = 'Матч';
            loadSingleMatch(false);
        } else {
            loadMatches(false);
        }
    </script>
</body>
</html>
